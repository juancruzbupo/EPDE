version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    target-branch: develop
    schedule:
      interval: 'weekly'
    groups:
      minor-and-patch:
        update-types: ['minor', 'patch']

  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: develop
    schedule:
      interval: 'weekly'
