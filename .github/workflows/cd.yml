name: CD

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci-reusable.yml
    secrets:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  deploy-api:
    name: Deploy API (Render)
    runs-on: ubuntu-latest
    needs: [ci]
    environment: production

    steps:
      - name: Trigger Render Deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: [ci]
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Web to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  verify-deploy:
    name: Verify Production Health
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    environment: production

    steps:
      - name: Wait for deploy propagation
        run: sleep 30

      - name: Verify API health
        run: |
          for i in {1..5}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.API_PRODUCTION_URL }}/api/v1/health" || echo "000")
            if [ "$status" = "200" ]; then
              echo "API health check passed"
              exit 0
            fi
            echo "Attempt $i: status $status, retrying in 15s..."
            sleep 15
          done
          echo "API health check FAILED after 5 attempts"
          exit 1

      - name: Verify Web availability
        run: |
          for i in {1..5}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.WEB_PRODUCTION_URL }}" || echo "000")
            if [ "$status" = "200" ]; then
              echo "Web health check passed"
              exit 0
            fi
            echo "Attempt $i: status $status, retrying in 15s..."
            sleep 15
          done
          echo "Web health check FAILED after 5 attempts"
          exit 1
