name: Nightly E2E & Coverage

on:
  schedule:
    - cron: '0 4 * * *' # Daily at 4:00 UTC
  workflow_dispatch: {}

jobs:
  ci:
    uses: ./.github/workflows/ci-reusable.yml
    with:
      run-coverage: true
      run-web-e2e: true
      # Mobile E2E: Detox scaffold ready (apps/mobile/.detoxrc.js + e2e/).
      # Enable run-mobile-e2e once Detox + EAS Build are integrated in CI runner.
    secrets:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
