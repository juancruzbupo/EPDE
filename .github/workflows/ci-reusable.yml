name: CI Reusable

on:
  workflow_call:
    inputs:
      run-coverage:
        description: 'Run per-app coverage checks'
        type: boolean
        default: false
      enforce-specs:
        description: 'Enforce spec files for modified services (PRs only)'
        type: boolean
        default: false
      run-web-e2e:
        description: 'Run Playwright web E2E tests'
        type: boolean
        default: false
    secrets:
      TURBO_TOKEN:
        required: false
      TURBO_TEAM:
        required: false

jobs:
  ci:
    name: Lint, Type Check, Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: epde_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5433/epde_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret-for-ci-must-be-at-least-32-chars-long
      NODE_ENV: test
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build
        run: pnpm build

      - name: Drift checks (schema, entity, docs)
        run: |
          pnpm check:schema-drift &
          node scripts/check-entity-drift.mjs &
          pnpm check:docs-drift &
          wait

      - name: Check file size limits
        run: node scripts/check-file-size.mjs

      - name: Lint and type check
        run: |
          pnpm lint &
          pnpm typecheck &
          wait

      - name: Guard — this.prisma only in allowed files
        run: |
          # Repository pattern enforcement: this.prisma must not appear in service/controller files.
          # Allowed exceptions (documented with JSDoc justification in each file):
          #   *.repository.ts, prisma.service.ts — by design
          #   metrics-collector.service.ts — infrastructure metrics (fire-and-forget)
          #   auth-audit.service.ts — fire-and-forget audit logging
          #   inspections.service.ts — cross-domain $transaction (5 tables)
          #   task-lifecycle.service.ts — cross-domain $transaction (bulk plan creation)
          #   dashboard.controller.ts — single inline query (tracked for future repo migration)
          violations=$(grep -rn "this\.prisma\." apps/api/src \
            --include="*.service.ts" \
            --include="*.controller.ts" \
            | grep -v "\.repository\." \
            | grep -v "prisma\.service\.ts" \
            | grep -v "metrics-collector\.service\.ts" \
            | grep -v "auth-audit\.service\.ts" \
            | grep -v "inspections\.service\.ts" \
            | grep -v "task-lifecycle\.service\.ts" \
            | grep -v "dashboard\.controller\.ts" \
            || true)
          if [ -n "$violations" ]; then
            echo "::error::Direct Prisma access outside repositories detected:"
            echo "$violations"
            echo ""
            echo "Move data access to a repository. See docs/adr/002-soft-delete-base-repository.md"
            exit 1
          fi

      - name: Push schema to test database
        run: pnpm --filter @epde/api exec prisma db push --skip-generate

      - name: Unit tests (parallel)
        run: |
          pnpm --filter @epde/api test &
          pnpm --filter @epde/web test &
          pnpm --filter @epde/mobile test &
          wait

      - name: E2E tests
        run: pnpm --filter @epde/api test:e2e

      - name: Install Playwright browsers
        if: inputs.run-web-e2e
        run: pnpm --filter @epde/web exec playwright install --with-deps chromium

      - name: Web E2E tests (Playwright)
        if: inputs.run-web-e2e
        run: pnpm --filter @epde/web test:e2e

      - name: Coverage checks (parallel)
        if: inputs.run-coverage
        run: |
          pnpm --filter @epde/web test -- --coverage &
          pnpm --filter @epde/mobile test -- --coverage &
          pnpm --filter @epde/api test -- --coverage &
          wait

      - name: Upload coverage reports
        if: inputs.run-coverage && !cancelled()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: coverage-reports
          path: |
            apps/web/coverage/
            apps/mobile/coverage/
            apps/api/coverage/
          retention-days: 14

      - name: Enforce spec files for modified services
        if: inputs.enforce-specs && github.event_name == 'pull_request'
        run: |
          missing=""
          for svc in $(find apps/api/src -name "*.service.ts" -not -name "*.spec.ts" -not -path "*/node_modules/*" -not -path "*/dist/*"); do
            spec="${svc%.ts}.spec.ts"
            if [ ! -f "$spec" ]; then
              svc_relative="${svc#./}"
              if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qF "$svc_relative"; then
                missing="$missing\n  $svc"
              fi
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Services modificados sin spec file:$missing"
            exit 1
          fi
