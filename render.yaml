# render.yaml — Staging configuration.
# For production: upgrade plan to 'starter' or 'standard',
# set NODE_ENV to 'production', and configure all sync:false
# secrets via Render dashboard.
services:
  - type: web
    name: epde-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    plan: starter
    scaling:
      minInstances: 2
      maxInstances: 5
      targetMemoryPercent: 80
      targetCPUPercent: 70
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '3001'
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: '15m'
      - key: JWT_REFRESH_EXPIRATION
        value: '7d'
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: COOKIE_SAME_SITE
        value: 'strict'
      - key: SEED_ADMIN_PASSWORD
        sync: false
