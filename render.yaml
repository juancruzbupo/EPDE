services:
  - type: web
    name: epde-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: staging
      - key: PORT
        value: '3001'
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: '15m'
      - key: JWT_REFRESH_EXPIRATION
        value: '7d'
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: COOKIE_SAME_SITE
        value: 'none'
      - key: SEED_ADMIN_PASSWORD
        sync: false
